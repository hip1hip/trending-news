# 비밀번호·DATABASE_URL 은 .env 에만 두세요. 이 파일에는 기본 자격 증명을 넣지 않습니다.
# 사용 전: copy .env.example .env 후 값 채우기

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trending}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-trending}
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      SCHEDULER_TZ: ${SCHEDULER_TZ:-Asia/Seoul}
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
