services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: trending
      POSTGRES_PASSWORD: trending
      POSTGRES_DB: trending
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trending -d trending"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://trending:trending@db:5432/trending
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
      SCHEDULER_TZ: Asia/Seoul
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
