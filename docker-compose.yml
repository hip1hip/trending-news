# 비밀번호·DATABASE_URL 은 .env 에만 두세요.
# ${VAR} 치환은 호스트 환경 변수가 .env 보다 우선합니다.
# Windows 등에서 DATABASE_URL 이 localhost 로 덮이는 문제를 피하려고 db/app 은 env_file 로 .env 를 직접 주입합니다.

services:
  db:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
